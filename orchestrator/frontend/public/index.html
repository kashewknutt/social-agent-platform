<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fleet Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f7f5ff;
        --surface: #ffffff;
        --surface-soft: #faf8ff;
        --ink: #211a35;
        --muted: #7a7195;
        --line: #e5e0f2;
        --accent: #7c5cfc;
        --accent-light: #e9e3ff;
        --accent-ink: #ffffff;
        --ok: #1ea885;
        --warn: #d08c00;
        --danger: #d9404a;
        --idle: #8c8aa0;
        --track: #ede9f9;
        --log-bg: #1f1a2e;
        --log-fg: #e5e0f2;
        --font: "DM Sans", "Segoe UI", system-ui, sans-serif;
        --display: "Instrument Serif", Georgia, serif;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        color: var(--ink);
        font-family: var(--font);
        background: var(--bg);
        line-height: 1.45;
      }
      .wrap { width: min(1120px, calc(100% - 2rem)); margin: 0 auto; padding: 2rem 0 3rem; }
      header { margin-bottom: 1.5rem; }
      .brand { font-family: var(--display); font-size: clamp(2.4rem, 6vw, 3.2rem); margin: 0; font-weight: 400; }
      .sub { margin: 0.25rem 0 0; color: var(--muted); font-size: 0.95rem; }
      .top-bar { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 1.5rem; }
      .pulse {
        display: inline-flex; align-items: center; gap: 0.45rem;
        font-size: 0.75rem; color: var(--muted); font-weight: 500; letter-spacing: 0.03em;
      }
      .pulse .dot {
        width: 0.5rem; height: 0.5rem; border-radius: 50%; background: var(--ok);
        box-shadow: 0 0 0 0 rgba(30, 168, 133, 0.35); animation: beat 1.5s infinite;
      }
      .pulse.busy .dot { background: var(--accent); }
      @keyframes beat { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

      .fleet { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1.25rem; }
      @media (max-width: 800px) { .fleet { grid-template-columns: 1fr; } }
      .chip {
        border: 1px solid var(--line); background: var(--surface); border-radius: 16px;
        padding: 1rem; text-align: left; cursor: pointer; transition: all 0.15s ease;
      }
      .chip:hover { border-color: #cbbdf7; transform: translateY(-1px); }
      .chip.active { border-color: var(--accent); background: var(--surface-soft); box-shadow: 0 8px 28px rgba(124, 92, 252, 0.1); }
      .chip h2 { margin: 0 0 0.4rem; font-size: 1.05rem; font-weight: 600; }
      .chip .meta { display: flex; gap: 0.55rem; flex-wrap: wrap; font-size: 0.78rem; color: var(--muted); }

      .panel {
        background: var(--surface); border: 1px solid var(--line); border-radius: 18px;
        padding: 1.25rem; box-shadow: 0 8px 24px rgba(124, 92, 252, 0.06);
      }
      .panel-head { display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
      .panel-head h3 { font-family: var(--display); font-size: 1.6rem; margin: 0; font-weight: 400; }
      .panel-head .hint { margin: 0.3rem 0 0; color: var(--muted); font-size: 0.85rem; display: flex; gap: 0.6rem; flex-wrap: wrap; }
      .pill {
        display: inline-flex; align-items: center; gap: 0.3rem;
        padding: 0.12rem 0.5rem; border-radius: 999px; font-size: 0.7rem;
        font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
        background: var(--track); color: var(--idle);
      }
      .pill.running, .pill.idle { background: #d8f6ee; color: var(--ok); }
      .pill.paused { background: #fff4d6; color: var(--warn); }
      .pill.error { background: #ffe6e7; color: var(--danger); }
      .pill.offline, .pill.stopped { background: #f0eef5; color: var(--idle); }
      .controls { display: flex; flex-wrap: wrap; gap: 0.45rem; align-items: center; }
      button, .btn {
        border: 1px solid var(--line); background: var(--surface); color: var(--ink);
        border-radius: 10px; padding: 0.5rem 0.8rem; font: inherit; font-size: 0.85rem; font-weight: 500;
        cursor: pointer; transition: background 0.12s ease, opacity 0.12s ease;
      }
      button:hover:not(:disabled) { background: var(--surface-soft); border-color: #cbbdf7; }
      button.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
      button.primary:hover:not(:disabled) { background: #6a4be0; }
      button.danger { border-color: #f5c3c6; color: var(--danger); }
      button.danger:hover:not(:disabled) { background: #fff5f5; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      button.busy { position: relative; }
      button.busy::after {
        content: ""; width: 0.65rem; height: 0.65rem; margin-left: 0.4rem;
        border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%;
        display: inline-block; vertical-align: -0.12rem; animation: spin 0.75s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .options {
        display: flex; flex-wrap: wrap; gap: 0.8rem 1.2rem; padding: 0.7rem 0.9rem;
        background: var(--surface-soft); border: 1px solid var(--line); border-radius: 12px; margin-bottom: 1rem;
        font-size: 0.82rem; color: var(--muted);
      }
      .options label { display: inline-flex; align-items: center; gap: 0.4rem; cursor: pointer; }
      .options input { accent-color: var(--accent); }

      .steps {
        display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.45rem; margin-bottom: 1rem;
      }
      @media (max-width: 800px) { .steps { grid-template-columns: 1fr 1fr; } }
      .step {
        border: 1px solid var(--line); border-radius: 10px; padding: 0.55rem 0.65rem;
        background: var(--surface); font-size: 0.75rem; color: var(--muted);
      }
      .step strong { display: block; color: var(--ink); font-size: 0.78rem; margin-bottom: 0.15rem; font-weight: 600; }
      .step.done { border-color: #b7e5d8; background: #f0faf6; }
      .step.active { border-color: var(--accent); background: var(--accent-light); color: var(--ink); }
      .step.fail { border-color: #f5c3c6; background: #fff5f5; }
      .progress-wrap { margin: 0 0 1rem; }
      .progress-meta {
        display: flex; justify-content: space-between; gap: 0.75rem; flex-wrap: wrap;
        font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem;
      }
      .progress-track {
        height: 0.55rem; border-radius: 999px; background: var(--track); overflow: hidden;
      }
      .progress-fill {
        height: 100%; width: 0%; border-radius: 999px; background: var(--accent);
        transition: width 0.35s ease;
      }
      .progress-fill.running { background: linear-gradient(90deg, var(--accent), #9b87ff, var(--accent)); background-size: 200% 100%; animation: shimmer 1.4s linear infinite; }
      @keyframes shimmer { to { background-position: -200% 0; } }
      .status-banner {
        margin: 0 0 1rem; padding: 0.75rem 0.9rem; border-radius: 12px;
        background: var(--accent-light); border: 1px solid #d4c9ff; font-size: 0.88rem;
      }
      .status-banner strong { display: block; margin-bottom: 0.15rem; }

      .grid { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 1rem; }
      @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
      h4 { margin: 0 0 0.5rem; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
      .logs-head {
        display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.5rem;
      }
      .logs-head h4 { margin: 0; }
      .logs-head .ghost {
        font-size: 0.72rem; padding: 0.25rem 0.55rem; border-radius: 8px;
        border: 1px solid var(--line); background: var(--surface); color: var(--ink); cursor: pointer;
      }
      .logs-head .ghost:hover { background: var(--track); }
      .logs-head .ghost.copied { border-color: #c3eada; color: var(--ok); }
      .logs {
        margin: 0; min-height: 220px; max-height: 320px; overflow: auto;
        padding: 0.85rem 0.95rem; border-radius: 12px; background: var(--log-bg);
        color: var(--log-fg); font-family: "SFMono-Regular", Consolas, monospace; font-size: 0.75rem; line-height: 1.5;
        white-space: pre-wrap;
      }
      .artifacts { font-size: 0.82rem; color: var(--muted); }
      .artifacts div { margin-bottom: 0.35rem; }
      .artifacts code { font-family: "SFMono-Regular", Consolas, monospace; font-size: 0.72rem; color: var(--ink); word-break: break-all; background: var(--track); padding: 0.1rem 0.3rem; border-radius: 4px; }
      .empty { color: var(--muted); font-size: 0.85rem; }
      .field { display: grid; gap: 0.3rem; margin-bottom: 0.6rem; }
      .field label { font-size: 0.75rem; color: var(--muted); font-weight: 500; }
      .field input, .field textarea {
        width: 100%; border: 1px solid var(--line); border-radius: 10px;
        padding: 0.55rem 0.65rem; font: inherit; font-size: 0.85rem; background: var(--surface);
      }
      .field textarea { min-height: 64px; resize: vertical; }
      .banner {
        margin: 0 0 0.9rem; padding: 0.65rem 0.85rem; border-radius: 10px; font-size: 0.85rem;
      }
      .banner.error { background: #fff1f2; color: var(--danger); border: 1px solid #f5c3c6; }
      .banner.ok { background: #edf8f4; color: var(--ok); border: 1px solid #c3eada; }
      .banner.info { background: #f2efff; color: #5a43c9; border: 1px solid #d8d0f8; }
      .banner.warn { background: #fff9e6; color: var(--warn); border: 1px solid #f5deb3; }
      .domain-card {
        border: 1px solid var(--line); border-radius: 12px; background: var(--surface-soft); padding: 0.85rem 1rem; margin-bottom: 1rem;
      }
      .domain-card h5 { margin: 0 0 0.4rem; font-size: 0.85rem; color: var(--muted); }
      .domain-card p { margin: 0; font-size: 0.9rem; }
      .domain-card .tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.45rem; }
      .domain-card .tag { font-size: 0.72rem; background: var(--track); color: var(--muted); border-radius: 999px; padding: 0.15rem 0.5rem; }
      .skeleton { opacity: 0.55; }

      .outputs { margin-top: 1.25rem; padding-top: 1.1rem; border-top: 1px solid var(--line); }
      .outputs-head {
        display: flex; justify-content: space-between; align-items: flex-end; gap: 1rem;
        flex-wrap: wrap; margin-bottom: 0.85rem;
      }
      .outputs-head h4 { margin: 0; }
      .outputs-meta { font-size: 0.8rem; color: var(--muted); }
      .tabs { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 0.85rem; }
      .tabs button {
        border-radius: 999px; padding: 0.35rem 0.75rem; font-size: 0.78rem;
        background: transparent; border-color: transparent; color: var(--muted);
      }
      .tabs button.active { background: var(--accent-light); color: var(--accent); border-color: #d4c9ff; font-weight: 600; }
      .run-select {
        border: 1px solid var(--line); border-radius: 10px; padding: 0.4rem 0.55rem;
        font: inherit; font-size: 0.8rem; background: var(--surface); color: var(--ink); max-width: 100%;
      }
      .post-list { display: grid; gap: 0.65rem; }
      .post-row {
        display: grid; grid-template-columns: auto 1fr auto; gap: 0.75rem; align-items: start;
        padding: 0.7rem 0; border-bottom: 1px solid var(--line);
      }
      .post-row:last-child { border-bottom: 0; }
      .score {
        min-width: 2.4rem; height: 2.4rem; border-radius: 10px; display: grid; place-items: center;
        font-weight: 700; font-size: 0.85rem; background: var(--accent-light); color: #5a43c9;
      }
      .post-row h5 { margin: 0 0 0.25rem; font-size: 0.9rem; font-weight: 600; }
      .post-row p { margin: 0; font-size: 0.8rem; color: var(--muted); }
      .post-row a { color: var(--accent); font-size: 0.78rem; text-decoration: none; word-break: break-all; }
      .post-row a:hover { text-decoration: underline; }
      .post-side { font-size: 0.72rem; color: var(--muted); text-align: right; white-space: nowrap; }
      .report {
        margin: 0; max-height: 420px; overflow: auto; padding: 1rem 1.1rem;
        border: 1px solid var(--line); border-radius: 12px; background: var(--surface-soft);
        font-size: 0.88rem; line-height: 1.55; white-space: pre-wrap;
      }
      .report h1, .report h2, .report h3 { font-family: var(--display); font-weight: 400; margin: 1rem 0 0.4rem; }
      .report h1 { font-size: 1.45rem; margin-top: 0; }
      .report h2 { font-size: 1.2rem; }
      .note-block {
        padding: 0.75rem 0; border-bottom: 1px solid var(--line); font-size: 0.85rem;
      }
      .note-block:last-child { border-bottom: 0; }
      .note-block .url { font-size: 0.75rem; color: var(--accent); word-break: break-all; }
      .ix-list { display: grid; gap: 0.65rem; }
      .ix-item {
        border: 1px solid var(--line); border-radius: 12px; padding: 0.75rem 0.85rem;
        background: var(--surface-soft);
      }
      .ix-top { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
      .ix-item textarea {
        width: 100%; min-height: 64px; margin-top: 0.35rem; border: 1px solid var(--line);
        border-radius: 10px; padding: 0.5rem 0.65rem; font: inherit; font-size: 0.85rem;
      }
      .catch-panel { margin-top: 1.25rem; padding-top: 1.1rem; border-top: 1px solid var(--line); }
      .catch-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
      .catch-table th {
        text-align: left; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--muted); padding: 0.45rem 0.4rem; border-bottom: 1px solid var(--line);
      }
      .catch-table td {
        padding: 0.55rem 0.4rem; border-bottom: 1px solid var(--line); vertical-align: top;
      }
      .catch-table tr.reject { opacity: 0.72; }
      .catch-table .score-cell {
        font-weight: 700; min-width: 2.5rem;
      }
      .catch-table .score-cell.kept { color: #5a43c9; }
      .catch-table .score-cell.drop { color: var(--danger); }
      .badge-kept, .badge-drop {
        display: inline-block; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.04em;
        text-transform: uppercase; padding: 0.12rem 0.4rem; border-radius: 999px;
      }
      .badge-kept { background: #d8f6ee; color: var(--ok); }
      .badge-drop { background: #ffe6e7; color: var(--danger); }
      .catch-cap { color: var(--ink); font-weight: 500; }
      .catch-meta { color: var(--muted); font-size: 0.75rem; margin-top: 0.2rem; }
      .ingest-modal-backdrop {
        position: fixed; inset: 0; z-index: 9999;
        background: rgba(12, 14, 22, 0.55);
        display: flex; align-items: center; justify-content: center; padding: 1rem;
      }
      .ingest-modal {
        background: var(--card, #fff); color: var(--ink, #111);
        border-radius: 14px; max-width: 520px; width: 100%;
        box-shadow: 0 24px 60px rgba(0,0,0,0.25); padding: 1.25rem 1.35rem;
        border: 1px solid var(--line, #e5e7eb);
      }
      .ingest-modal h3 { margin: 0 0 0.35rem; font-size: 1.05rem; }
      .ingest-modal .hint { color: var(--muted); font-size: 0.82rem; margin-bottom: 0.75rem; }
      .ingest-modal textarea {
        width: 100%; min-height: 96px; resize: vertical;
        border: 1px solid var(--line); border-radius: 8px; padding: 0.65rem;
        font: inherit; box-sizing: border-box;
      }
      .ingest-modal-actions { display: flex; gap: 0.5rem; margin-top: 0.85rem; justify-content: flex-end; }
      .ingest-modal-actions button { min-width: 7rem; }
    </style>
  </head>
  <body>
    <div class="wrap" id="app">
      <div class="top-bar">
        <header>
          <h1 class="brand">Fleet Control</h1>
          <p class="sub">Boot, observe, and steer every social agent.</p>
        </header>
        <div class="pulse" id="pulse"><span class="dot"></span><span id="pulse-text">Connecting…</span></div>
      </div>
      <p class="empty">Loading fleet…</p>
    </div>
    <script>
      const app = document.getElementById("app");
      const state = {
        bots: [],
        selectedId: null,
        logs: [],
        direction: null,
        outputs: null,
        outputTab: "posts",
        selectedRunId: null,
        error: "",
        notice: "",
        busy: "",
        loading: true,
        sample: false,
        offline: false,
        multimodal: true,
        engage: true,
        interactions: [],
        ixDrafts: {},
        circuit: null,
        scriptedHealth: null,
        live: null,
        disconnectLog: [],
        bootLogTail: [],
        lastRefreshMs: 0,
        painted: false,
        forceFullRender: false,
        ingestCommentDraftToken: null,
        ingestCommentDraftText: "",
      };

      const STEPS = ["boot", "ingest", "filter", "synthesize", "done"];

      function syncIngestCommentModal() {
        let root = document.getElementById("ingest-comment-root");
        if (!root) {
          root = document.createElement("div");
          root.id = "ingest-comment-root";
          document.body.appendChild(root);
        }
        const pending = state.live?.pending_comment;
        if (!pending) {
          root.innerHTML = "";
          return;
        }
        const token = pending.token || pending.requested_at || "pending";
        if (state.ingestCommentDraftToken !== token) {
          state.ingestCommentDraftToken = token;
          state.ingestCommentDraftText = pending.draft_text || "";
        }
        const cap = (pending.caption || pending.post_url || "Reel").slice(0, 180);
        root.innerHTML = `
          <div class="ingest-modal-backdrop" role="dialog" aria-modal="true" aria-label="Approve ingest comment">
            <div class="ingest-modal">
              <h3>Comment on this reel now?</h3>
              <p class="hint">Ingest is paused until you approve or skip. Edit the draft below if you like.</p>
              <div class="catch-meta">${pending.username ? `@${esc(pending.username)} · ` : ""}${esc(cap)}</div>
              <textarea id="ingest-comment-text" rows="4">${esc(state.ingestCommentDraftText)}</textarea>
              <div class="ingest-modal-actions">
                <button type="button" class="ghost" data-ingest-comment="skip">Skip</button>
                <button type="button" class="primary" data-ingest-comment="approve">Approve &amp; comment</button>
              </div>
            </div>
          </div>`;
        const ta = root.querySelector("#ingest-comment-text");
        if (ta) {
          ta.oninput = () => { state.ingestCommentDraftText = ta.value; };
        }
        root.querySelectorAll("[data-ingest-comment]").forEach((btn) => {
          btn.onclick = async () => {
            const bot = selected();
            if (!bot) return;
            const approve = btn.dataset.ingestComment === "approve";
            const text = root.querySelector("#ingest-comment-text")?.value || state.ingestCommentDraftText || "";
            state.busy = "comment";
            state.error = "";
            try {
              await api(`/api/bots/${bot.id}/ingest/comment-decision`, {
                method: "POST",
                body: JSON.stringify({ approve, text: approve ? text : null }),
              });
              state.notice = approve ? "Comment approved — posting on reel…" : "Skipped comment — continuing ingest";
              state.ingestCommentDraftToken = null;
              root.innerHTML = "";
            } catch (e) {
              state.error = e.message;
            } finally {
              state.busy = "";
            }
          };
        });
      }

      async function api(path, options = {}) {
        const res = await fetch(path, {
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
          ...options,
        });
        const text = await res.text();
        let data = null;
        try { data = text ? JSON.parse(text) : null; } catch { data = { detail: text }; }
        if (!res.ok) {
          const detail = data?.detail ?? text ?? res.statusText;
          throw new Error(typeof detail === "string" ? detail : JSON.stringify(detail));
        }
        return data;
      }

      function selected() { return state.bots.find((b) => b.id === state.selectedId) || null; }
      function botState(bot) { return bot?.status?.state || bot?.health?.state || "offline"; }

      function stepStatus(bot, stepName) {
        const st = botState(bot);
        const cur = (bot?.status?.current_step || "").toLowerCase();
        const last = (bot?.status?.last_action || "").toLowerCase();
        const reachable = Boolean(bot?.health?.reachable);
        const order = { ingest: 1, filter: 2, multimodal: 3, synthesize: 4, propose: 5, engage: 6 };
        if (stepName === "boot") return reachable ? "done" : (state.busy === "boot" ? "active" : "");
        if (!reachable) return "";
        if (stepName === "done") {
          if (st === "idle" && (last.includes("completed") || cur === "idle")) return "done";
          return "";
        }
        if (st === "error" && Object.keys(order).some((k) => cur.includes(k) && stepName === k)) return "fail";
        if (st === "running" || st === "paused") {
          if (cur.includes(stepName) || last.includes(stepName)) return "active";
          const curKey = Object.keys(order).find((k) => cur.includes(k));
          const curOrder = curKey ? order[curKey] : 0;
          if (order[stepName] && curOrder && order[stepName] < curOrder) return "done";
        }
        if (st === "idle" && last.includes("completed")) {
          if (order[stepName]) return "done";
        }
        return "";
      }

      function pipelineProgress(bot) {
        const st = botState(bot);
        const cur = (bot?.status?.current_step || "").toLowerCase();
        const last = bot?.status?.last_action || "";
        const stages = [
          { id: "boot", label: "Boot", weight: 5 },
          { id: "ingest", label: "Ingest", weight: 45 },
          { id: "filter", label: "Filter", weight: 15 },
          { id: "multimodal", label: "Analyze", weight: 10 },
          { id: "synthesize", label: "Synthesize", weight: 15 },
          { id: "propose", label: "Propose", weight: 5 },
          { id: "engage", label: "Engage", weight: 5 },
        ];
        let pct = 0;
        if (!bot?.health?.reachable) return { pct: 0, label: "Bot offline — click Boot API", running: false };
        if (st === "idle" && (last.toLowerCase().includes("completed") || cur === "idle")) {
          return { pct: 100, label: last || "Pipeline completed", running: false };
        }
        let found = false;
        for (const stage of stages) {
          const cls = stepStatus(bot, stage.id);
          if (cls === "done") pct += stage.weight;
          else if (cls === "active" || cls === "fail") {
            pct += stage.weight * (cls === "fail" ? 0.5 : 0.45);
            found = true;
            return {
              pct: Math.min(98, Math.round(pct)),
              label: `${stage.label}: ${last || cur || "in progress"}`,
              running: st === "running" || st === "paused",
            };
          }
        }
        if (st === "running" && !found) {
          return { pct: 8, label: last || "Starting…", running: true };
        }
        return { pct: Math.round(pct), label: last || "Ready", running: false };
      }

      function userIsBusy() {
        const active = document.activeElement;
        if (active && app.contains(active)) {
          const tag = (active.tagName || "").toLowerCase();
          if (tag === "input" || tag === "textarea" || tag === "select" || active.isContentEditable) {
            return true;
          }
        }
        const sel = window.getSelection && window.getSelection();
        if (sel && !sel.isCollapsed && String(sel).length > 0) {
          const node = sel.anchorNode;
          if (node && app.contains(node.nodeType === 1 ? node : node.parentElement)) {
            return true;
          }
        }
        return false;
      }

      async function refreshFleet() {
        const t0 = performance.now();
        try {
          const data = await api("/api/bots");
          state.bots = data.bots || [];
          if (!state.selectedId && state.bots[0]) state.selectedId = state.bots[0].id;
          state.error = "";
          state.loading = false;
        } catch (e) {
          state.error = e.message;
          state.loading = false;
        }
        state.lastRefreshMs = Math.round(performance.now() - t0);
        await refreshDetail(false);
        // Never wipe the whole DOM on the poll loop — that kills typing + text selection.
        if (!state.painted || state.forceFullRender) {
          state.forceFullRender = false;
          render();
        } else {
          patchLiveOnly();
        }
        syncIngestCommentModal();
      }

      async function refreshDetail(doRender = true) {
        const bot = selected();
        if (!bot) return;
        try {
          const runQs = state.selectedRunId ? `?run_id=${encodeURIComponent(state.selectedRunId)}` : "";
          const [snap, logData, dir, outputs, ixData, liveData, discData, bootData] = await Promise.all([
            api(`/api/bots/${bot.id}`).catch(() => null),
            api(`/api/bots/${bot.id}/logs?tail=150`).catch(() => ({ lines: [] })),
            api(`/api/bots/${bot.id}/direction`).catch(() => null),
            api(`/api/bots/${bot.id}/outputs${runQs}`).catch(() => null),
            api(`/api/bots/${bot.id}/interactions?limit=100`).catch(() => ({ interactions: [] })),
            api(`/api/bots/${bot.id}/live`).catch(() => null),
            api(`/api/bots/${bot.id}/disconnect-log?tail=20`).catch(() => ({ lines: [] })),
            api(`/api/bots/${bot.id}/boot-log?tail=40`).catch(() => ({ lines: [] })),
          ]);
          if (snap) state.bots = state.bots.map((b) => (b.id === snap.id ? snap : b));
          state.logs = logData.lines || [];
          state.disconnectLog = discData?.lines || [];
          state.bootLogTail = bootData?.lines || [];
          // Don't clobber Direction fields while the operator is typing in that form
          if (!isEditingDirection()) state.direction = dir;
          state.outputs = outputs;
          state.interactions = ixData?.interactions || [];
          state.circuit = ixData?.circuit || state.circuit;
          state.scriptedHealth = ixData?.scripted_health || state.scriptedHealth;
          const ixIds = new Set((state.interactions || []).map((i) => i.id));
          for (const id of Object.keys(state.ixDrafts)) {
            const ix = (state.interactions || []).find((i) => i.id === id);
            if (!ixIds.has(id) || (ix && ix.status !== "proposed" && ix.status !== "approved")) {
              delete state.ixDrafts[id];
            }
          }
          state.live = snap?.status?.live || liveData || outputs?.live || state.live;
          if (outputs?.run?.run_id && !state.selectedRunId) {
            state.selectedRunId = outputs.run.run_id;
          }
        } catch (e) {
          state.error = e.message;
        }
        if (doRender) render();
      }

      function simpleMarkdown(md) {
        const lines = String(md || "").split("\n");
        const html = [];
        for (const line of lines) {
          if (line.startsWith("# ")) html.push(`<h1>${esc(line.slice(2))}</h1>`);
          else if (line.startsWith("## ")) html.push(`<h2>${esc(line.slice(3))}</h2>`);
          else if (line.startsWith("### ")) html.push(`<h3>${esc(line.slice(4))}</h3>`);
          else if (line.trim() === "") html.push("<br/>");
          else if (line.trim().startsWith("- ") || line.trim().startsWith("* "))
            html.push(`<div>• ${esc(line.trim().slice(2))}</div>`);
          else html.push(`<div>${esc(line)}</div>`);
        }
        return html.join("");
      }

      function renderCaught() {
        const live = state.live;
        const out = state.outputs;
        const posts = (live?.posts && live.posts.length)
          ? live.posts
          : (out?.posts?.all_scored || out?.posts?.filtered || out?.posts?.raw || []);
        const threshold = live?.threshold ?? out?.run?.threshold ?? 60;
        const caught = live?.caught ?? posts.length;
        const kept = live?.kept ?? posts.filter((p) => p.kept || (p.relevance_score != null && p.relevance_score >= threshold)).length;
        const rejected = live?.rejected ?? Math.max(0, posts.length - kept);
        const stage = live?.stage || (out?.run ? "idle" : "waiting");

        const rows = posts.length
          ? posts.map((p, i) => {
              const score = p.relevance_score;
              const isKept = p.kept === true || (score != null && score >= threshold);
              const scored = score != null;
              const gate = scored
                ? (isKept ? `<span class="badge-kept">kept</span>` : `<span class="badge-drop">below ${threshold}</span>`)
                : `<span class="empty">${stage === "ingest" ? "catching…" : (stage === "filter" ? "scoring…" : "unscored")}</span>`;
              const cap = (p.caption || "").trim();
              const looksLikeNoise = /AgentOutput\(|thinking=/.test(cap);
              const title = looksLikeNoise
                ? (p.post_url || "Caught reel (caption pending)")
                : (cap || p.post_url || "No caption");
              return `
                <tr class="${scored && !isKept ? "reject" : ""}">
                  <td>${i + 1}</td>
                  <td class="score-cell ${!scored ? "" : (isKept ? "kept" : "drop")}">${scored ? score : "—"}</td>
                  <td>${gate}</td>
                  <td>
                    <div class="catch-cap">${esc(title.slice(0, 160))}${title.length > 160 ? "…" : ""}</div>
                    <div class="catch-meta">
                      ${p.username ? `@${esc(p.username)} · ` : ""}${p.post_type ? esc(p.post_type) : "post"}
                      ${p.likes != null && p.likes !== "" ? ` · ${fmtCount(p.likes, "likes")}` : ""}
                      ${p.views != null && p.views !== "" ? ` · ${fmtCount(p.views, "views")}` : ""}
                      ${p.comments_count != null && p.comments_count !== "" ? ` · ${fmtCount(p.comments_count, "comments")}` : ""}
                    </div>
                    ${p.reason && !looksLikeNoise ? `<div class="catch-meta">${esc(p.reason)}</div>` : ""}
                    ${p.post_url ? `<div class="catch-meta"><a href="${esc(p.post_url)}" target="_blank" rel="noreferrer">${esc(p.post_url)}</a></div>` : ""}
                  </td>
                </tr>`;
            }).join("")
          : `<tr><td colspan="4" class="empty">No reels caught yet — start Run research and watch this table fill live.</td></tr>`;

        return `
          <div class="catch-panel">
            <div class="outputs-head">
              <div>
                <h4>Caught reels</h4>
                <div class="outputs-meta">
                  Stage <strong>${esc(stage)}</strong>
                  · ${caught} caught · ${kept} kept · ${rejected} rejected
                  · threshold ≥ ${esc(String(threshold))}
                </div>
              </div>
            </div>
            <div style="overflow:auto; max-height:420px; border:1px solid var(--line); border-radius:12px;">
              <table class="catch-table">
                <thead><tr><th>#</th><th>Score</th><th>Gate</th><th>Reel / data</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>`;
      }

      function renderOutputs() {
        const out = state.outputs;
        if (!out) {
          return `<div class="outputs"><h4>Outputs</h4><p class="empty">Outputs API unavailable for this bot.</p></div>`;
        }
        if (!out.run && !(state.live?.posts || []).length) {
          return `<div class="outputs"><h4>Outputs</h4><p class="empty">No completed runs yet. Run research to catch live Instagram data.</p></div>`;
        }
        const run = out.run || { run_id: "live", status: state.live?.stage || "running" };
        const filtered = out.posts?.filtered || [];
        const raw = out.posts?.raw || [];
        const scored = out.posts?.all_scored || [];
        const notes = out.notes || [];
        const report = out.report;
        const runs = out.runs || [];

        const list = scored.length ? scored : filtered;
        const postsHtml = list.length
          ? `<div class="post-list">${list.map((p) => `
              <div class="post-row">
                <div class="score">${p.relevance_score ?? "—"}</div>
                <div>
                  <h5>${esc((p.caption || "Untitled post").slice(0, 120))}${((p.caption || "").length > 120) ? "…" : ""}</h5>
                  <p>${esc(p.reason || p.adaptable_hook || "")}${p.kept === false ? " · rejected" : ""}</p>
                  ${p.post_url ? `<a href="${esc(p.post_url)}" target="_blank" rel="noreferrer">${esc(p.post_url)}</a>` : ""}
                </div>
                <div class="post-side">
                  ${p.post_type ? esc(p.post_type) : ""}<br/>
                  ${p.likes != null && p.likes !== "" ? fmtCount(p.likes, "likes") : ""}
                </div>
              </div>`).join("")}</div>`
          : `<p class="empty">No scored posts for this run.${raw.length ? ` (${raw.length} raw ingested)` : ""}</p>`;

        const reportHtml = report?.body
          ? `<div class="report">${simpleMarkdown(report.body)}</div>`
          : `<p class="empty">No dashboard markdown saved for this run.</p>`;

        const notesHtml = notes.length
          ? notes.map((n) => `
              <div class="note-block">
                <div class="url">${esc(n.post_url || "Media note")}</div>
                <p>${esc(n.analysis || "")}</p>
              </div>`).join("")
          : `<p class="empty">No multimodal notes for this run.</p>`;

        const body =
          state.outputTab === "dashboard" ? reportHtml
            : state.outputTab === "notes" ? notesHtml
              : postsHtml;

        return `
          <div class="outputs">
            <div class="outputs-head">
              <div>
                <h4>Outputs</h4>
                <div class="outputs-meta">
                  Run <code>${esc(run.run_id)}</code>
                  · ${esc(run.status)}
                  · ${filtered.length} filtered / ${raw.length} raw
                  ${run.finished_at ? ` · ${(run.finished_at || "").slice(0, 19).replace("T", " ")}` : ""}
                </div>
              </div>
              <select class="run-select" id="run-select">
                ${runs.map((r) => `
                  <option value="${esc(r.run_id)}" ${r.run_id === run.run_id ? "selected" : ""}>
                    ${(r.started_at || "").slice(0, 19).replace("T", " ")} · ${r.status}${r.sample ? " · sample" : ""}
                  </option>`).join("")}
              </select>
            </div>
            <div class="tabs">
              <button type="button" data-tab="posts" class="${state.outputTab === "posts" ? "active" : ""}">All scored (${list.length}) · kept ${filtered.length}</button>
              <button type="button" data-tab="dashboard" class="${state.outputTab === "dashboard" ? "active" : ""}">Dashboard</button>
              <button type="button" data-tab="notes" class="${state.outputTab === "notes" ? "active" : ""}">Media notes (${notes.length})</button>
            </div>
            ${body}
          </div>`;
      }

      async function act(name, fn) {
        state.busy = name;
        state.error = "";
        state.notice = "";
        state.forceFullRender = true;
        render();
        try {
          const result = await fn();
          state.notice = typeof result?.message === "string"
            ? result.message
            : (name === "live" ? "Run started — watch the live trail and Chromium window." : "Done.");
          await refreshDetail(false);
        } catch (e) {
          state.error = e.message;
        } finally {
          state.busy = "";
          state.forceFullRender = true;
          render();
        }
      }

      function runBody() {
        return {
          mode: "once",
          sample: false,
          offline: Boolean(state.offline),
          multimodal: Boolean(state.multimodal),
          engage: Boolean(state.engage),
        };
      }

      function isEditingDirection() {
        const active = document.activeElement;
        return Boolean(active && app.contains(active) && active.closest && active.closest("#dir-form"));
      }

      function isEditingInteraction() {
        const active = document.activeElement;
        return Boolean(active && app.contains(active) && active.matches && active.matches("textarea[data-draft]"));
      }

      function syncDraftsFromDom() {
        app.querySelectorAll(".ix-item textarea[data-draft]").forEach((ta) => {
          const id = ta.closest(".ix-item")?.dataset?.ixId;
          if (id) state.ixDrafts[id] = ta.value;
        });
        if (isEditingDirection() && state.direction) {
          const form = app.querySelector("#dir-form");
          if (form) {
            const fd = new FormData(form);
            state.direction = {
              ...state.direction,
              brand_name: String(fd.get("brand_name") ?? state.direction.brand_name ?? ""),
              business_type: String(fd.get("business_type") ?? state.direction.business_type ?? ""),
              website: String(fd.get("website") ?? state.direction.website ?? ""),
              region: String(fd.get("region") ?? state.direction.region ?? ""),
              goals: String(fd.get("goals") ?? state.direction.goals ?? ""),
              constraints: String(fd.get("constraints") ?? state.direction.constraints ?? ""),
              brand_voice: String(fd.get("brand_voice") ?? state.direction.brand_voice ?? ""),
              competitor_hashtags: String(fd.get("hashtags") || "").split("\n").map((s) => s.trim()).filter(Boolean),
              content_pillars: String(fd.get("pillars") || "").split("\n").map((s) => s.trim()).filter(Boolean),
            };
          }
        }
      }

      function captureUiState() {
        syncDraftsFromDom();
        const active = document.activeElement;
        const focus = { kind: null };
        if (active && app.contains(active)) {
          if (active.matches("textarea[data-draft]")) {
            const id = active.closest(".ix-item")?.dataset?.ixId || null;
            focus.kind = "ix";
            focus.id = id;
            focus.start = active.selectionStart;
            focus.end = active.selectionEnd;
          } else if (active.closest("#dir-form") && active.name) {
            focus.kind = "dir";
            focus.name = active.name;
            focus.start = active.selectionStart;
            focus.end = active.selectionEnd;
          } else if (active.id) {
            focus.kind = "id";
            focus.id = active.id;
          }
        }
        return { focus };
      }

      function restoreUiState(ui) {
        if (!ui?.focus?.kind) return;
        let el = null;
        if (ui.focus.kind === "ix" && ui.focus.id) {
          el = app.querySelector(`.ix-item[data-ix-id="${CSS.escape(ui.focus.id)}"] textarea[data-draft]`);
        } else if (ui.focus.kind === "dir" && ui.focus.name) {
          el = app.querySelector(`#dir-form [name="${CSS.escape(ui.focus.name)}"]`);
        } else if (ui.focus.kind === "id" && ui.focus.id) {
          el = document.getElementById(ui.focus.id);
        }
        if (!el) return;
        el.focus({ preventScroll: true });
        if (typeof ui.focus.start === "number" && typeof el.setSelectionRange === "function") {
          try { el.setSelectionRange(ui.focus.start, ui.focus.end ?? ui.focus.start); } catch { /* ignore */ }
        }
      }

      function draftTextFor(ix) {
        if (ix?.id && Object.prototype.hasOwnProperty.call(state.ixDrafts, ix.id)) {
          return state.ixDrafts[ix.id];
        }
        return ix.final_text || ix.draft_text || "";
      }

      function renderInteractions() {
        // Only actionable HITL + in-flight autos. Done/failed/skipped clutter the queue.
        const ACTIVE = new Set(["proposed", "approved", "executing"]);
        const items = (state.interactions || []).filter((ix) => {
          const blob = `${ix.post_url || ""} ${ix.draft_text || ""} ${ix.final_text || ""}`;
          if (/sample\d|Apex Software/i.test(blob)) return false;
          if (!ACTIVE.has(ix.status)) return false;
          return true;
        });
        const hitl = items.filter((i) => !i.auto);
        const autos = items.filter((i) => i.auto);
        const allIx = state.interactions || [];
        const row = (ix) => {
          const editable = !ix.auto && (ix.status === "proposed" || ix.status === "approved");
          const text = draftTextFor(ix);
          const target = ix.post_url || ix.profile_url || ix.username || "—";
          const execTag = ix.payload?.executor === "scripted"
            ? `<span class="empty" style="color:#0a7">scripted</span>`
            : ix.payload?.executor === "llm_fallback"
              ? `<span class="empty" style="color:#c60">AI fallback</span>`
              : "";
          return `
            <div class="ix-item" data-ix-id="${esc(ix.id)}">
              <div class="ix-top">
                <strong>${esc(ix.kind)}</strong>
                <span class="pill ${esc(ix.status)}">${esc(ix.status)}</span>
                <span class="empty">${ix.auto ? "auto" : "HITL"}</span>
                ${execTag}
              </div>
              <div class="empty" style="margin:0.35rem 0">${esc(target)}</div>
              ${!ix.auto ? `<textarea data-draft ${editable ? "" : "disabled"}>${esc(text)}</textarea>` : ""}
              ${ix.error ? `<div class="banner error" style="margin:0.4rem 0">${esc(ix.error)}</div>` : ""}
              <div class="controls" style="margin-top:0.4rem">
                ${!ix.auto && ix.status === "proposed" ? `
                  <button type="button" class="primary" data-ix="approve">Approve</button>
                  <button type="button" data-ix="skip">Skip</button>` : ""}
                ${!ix.auto && ix.status === "approved" ? `
                  <button type="button" class="primary" data-ix="execute">Execute</button>
                  <button type="button" data-ix="skip">Skip</button>` : ""}
              </div>
            </div>`;
        };
        const hitlDone = allIx.filter((a) => !a.auto && a.status === "done").length;
        const hitlFailed = allIx.filter((a) => !a.auto && a.status === "failed").length;
        return `
          <div class="outputs" style="margin-top:1rem">
            <div class="outputs-head">
              <div>
                <h4>Interactions</h4>
                <div class="outputs-meta">
                  Queue ${items.length} ·
                  Auto ${autos.filter((a) => a.status === "proposed").length} queued ·
                  HITL ${hitl.filter((a) => a.status === "proposed").length} proposed /
                  ${hitl.filter((a) => a.status === "approved").length} approved
                  ${hitlDone || hitlFailed ? ` · cleared ${hitlDone} done / ${hitlFailed} failed` : ""}
                </div>
              </div>
              <div class="controls">
                <button type="button" data-act="propose" ${!selected()?.health?.reachable || state.busy ? "disabled" : ""}>Propose</button>
                <button type="button" data-act="exec-approved" ${!selected()?.health?.reachable || state.busy ? "disabled" : ""}>Execute approved</button>
                <button type="button" data-act="resume-engage" title="Clear soft pause / optionally rotate browser profile" ${!selected()?.health?.reachable || state.busy ? "disabled" : ""}>Resume engage</button>
              </div>
            </div>
            ${state.circuit?.open ? `<div class="banner warn">Engage paused ~${Math.max(1, Math.ceil((state.circuit.remaining_seconds || 0) / 60))}m after an Instagram challenge (profile slot ${state.circuit.profile_slot ?? 0}). VPN/incognito usually won't help account flags — use Resume engage, or Resume with profile rotate.</div>` : ""}
            ${state.scriptedHealth?.needs_selector_update ? `<div class="banner warn">${esc(state.scriptedHealth.message || "Some actions fell back to AI — update scripted_actions.py")} (${state.scriptedHealth.total || 0} today)</div>` : ""}
            <div class="ix-list">
              ${items.length ? items.map(row).join("") : `<p class="empty">No open interactions. Run research with Engage on, or click Propose.</p>`}
            </div>
          </div>`;
      }

      function esc(s) {
        return String(s).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");
      }

      function fmtCount(v, label) {
        if (v == null || v === "") return "";
        const n = Number(v);
        if (Number.isFinite(n)) return `${n.toLocaleString()} ${label}`;
        return `${String(v)} ${label}`;
      }

      function logsText(bot) {
        const reachable = Boolean(bot?.health?.reachable);
        const health = bot?.health || {};
        const lines = [];

        if (!reachable) {
          lines.push("Bot API offline — click Boot API.");
          if (health.error) lines.push("", "Last error:", health.error);
          if (health.boot_log) lines.push("", "Boot log:", health.boot_log);
          if (state.bootLogTail?.length) {
            lines.push("", "Boot log tail:");
            lines.push(...state.bootLogTail.slice(-12));
          }
          if (state.disconnectLog?.length) {
            lines.push("", "Recent disconnects:");
            for (const d of state.disconnectLog.slice(-8)) {
              const ts = (d.ts || "").slice(11, 19);
              lines.push(`${ts}  ${d.reason || "?"}  ${d.detail || ""}`);
            }
          }
          return lines.join("\n");
        }

        if (health.status_error) {
          lines.push(`API busy — status poll slow (${health.status_error})`);
          lines.push("");
        }
        if (health.note) {
          lines.push(health.note);
          lines.push("");
        }

        if (!state.logs.length) {
          return lines.length
            ? lines.join("\n") + "\n\nNo pipeline events yet — click Run research."
            : "No events yet — click Run research.";
        }
        const trail = state.logs.map((l) => `${(l.ts || "").slice(11, 19)}  ${(l.step || "-").padEnd(11)}  ${l.message}`).join("\n");
        return lines.length ? lines.join("\n") + "\n" + trail : trail;
      }

      function pulseLabel(st) {
        if (state.busy) return `Working: ${state.busy}…`;
        if (st === "running") return "Run in progress";
        return `Ready · refresh ${state.lastRefreshMs || "—"}ms`;
      }

      function setHtml(el, html) {
        if (!el) return;
        if (el.innerHTML !== html) el.innerHTML = html;
      }

      function patchLiveOnly() {
        // Any DOM write clears browser text selection — freeze the UI while busy.
        if (userIsBusy()) return;

        const bot = selected();
        const st = botState(bot);
        const reachable = Boolean(bot?.health?.reachable);
        const status = bot?.status;

        const pulse = document.getElementById("pulse-text");
        if (pulse) pulse.textContent = pulseLabel(st);
        const pulseWrap = document.getElementById("pulse");
        if (pulseWrap) pulseWrap.classList.toggle("busy", Boolean(state.busy || st === "running"));

        const trail = document.getElementById("live-trail");
        if (trail) {
          const next = logsText(bot);
          if (trail.textContent !== next) {
            const stick = trail.scrollTop + trail.clientHeight >= trail.scrollHeight - 40;
            trail.textContent = next;
            if (stick) trail.scrollTop = trail.scrollHeight;
          }
        }

        app.querySelectorAll("[data-select]").forEach((el) => {
          const b = state.bots.find((x) => x.id === el.dataset.select);
          if (!b) return;
          const pill = el.querySelector(".pill");
          const meta = el.querySelectorAll(".meta span");
          if (pill) {
            pill.className = `pill ${botState(b)}`;
            pill.textContent = botState(b);
          }
          if (meta[1]) meta[1].textContent = b.health?.reachable ? "API up" : "API down";
          if (meta[2]) meta[2].textContent = b.status?.current_step || b.status?.last_action || "—";
          el.classList.toggle("active", b.id === state.selectedId);
        });

        const hint = document.getElementById("panel-hint");
        if (hint && bot) {
          hint.innerHTML = `
            <span class="pill ${st}">${st}</span>
            <span>${esc(status?.current_step || status?.last_action || "waiting")}</span>
            ${status?.usage ? ` · ${status.usage.sessions_remaining} sessions left` : ""}
            ${status?.last_error ? ` · ${esc(status.last_error)}` : ""}`;
        }

        const progress = bot ? pipelineProgress(bot) : null;
        setHtml(document.getElementById("progress-mount"), progress ? `
          <div class="progress-wrap">
            <div class="progress-meta">
              <span>${esc(progress.label)}</span>
              <span>${progress.pct}%</span>
            </div>
            <div class="progress-track"><div class="progress-fill ${progress.running ? "running" : ""}" style="width:${progress.pct}%"></div></div>
          </div>
          ${progress.running ? `<div class="status-banner"><strong>Live status</strong>${esc(progress.label)}. Chromium may be open — the trail updates every few seconds.</div>` : ""}
        ` : "");

        setHtml(document.getElementById("steps-mount"), !bot ? "" : `
          <div class="steps">
            ${[
              ["boot", "Boot"],
              ["ingest", "Ingest"],
              ["filter", "Filter"],
              ["multimodal", "Analyze"],
              ["synthesize", "Synthesize"],
              ["done", "Done"],
            ].map(([id, label]) => {
              const cls = stepStatus(bot, id);
              return `<div class="step ${cls}"><strong>${label}</strong>${cls || "waiting"}</div>`;
            }).join("")}
          </div>`);

        setHtml(document.getElementById("catch-mount"), bot?.id === "instagram" ? renderCaught() : "");

        const arts = document.getElementById("artifacts-mount");
        if (arts) {
          const next = (status?.artifacts || []).length
            ? status.artifacts.map((a) => `<div><strong>${a.kind}</strong><br/><code>${a.path}</code></div>`).join("")
            : `<span class="empty">None yet</span>`;
          setHtml(arts, next);
        }

        setHtml(document.getElementById("outputs-mount"), bot?.id === "instagram" ? renderOutputs() : "");
        syncDraftsFromDom();
        setHtml(document.getElementById("ix-mount"), bot?.id === "instagram" ? renderInteractions() : "");
        bindSoft();

        const panel = app.querySelector(".panel");
        if (panel) {
          panel.querySelectorAll("[data-act]").forEach((btn) => {
            const name = btn.dataset.act;
            if (name === "boot") btn.disabled = Boolean(state.busy);
            if (name === "live") btn.disabled = Boolean(state.busy || !reachable);
            if (name === "pause") btn.disabled = Boolean(state.busy || !reachable || st !== "running");
            if (name === "resume") btn.disabled = Boolean(state.busy || !reachable || st !== "paused");
            if (name === "stop") btn.disabled = Boolean(state.busy || !reachable || (st !== "running" && st !== "paused"));
            if (name === "propose" || name === "exec-approved") btn.disabled = Boolean(!reachable || state.busy);
            if (name === "copy-logs") btn.disabled = !state.logs.length;
          });
        }
      }

      function fillStatusMounts() {
        // Used after a full render — never gated on userIsBusy (DOM was just rebuilt).
        const bot = selected();
        const st = botState(bot);
        const progress = bot ? pipelineProgress(bot) : null;
        setHtml(document.getElementById("progress-mount"), progress ? `
          <div class="progress-wrap">
            <div class="progress-meta">
              <span>${esc(progress.label)}</span>
              <span>${progress.pct}%</span>
            </div>
            <div class="progress-track"><div class="progress-fill ${progress.running ? "running" : ""}" style="width:${progress.pct}%"></div></div>
          </div>
          ${progress.running ? `<div class="status-banner"><strong>Live status</strong>${esc(progress.label)}. Chromium may be open — the trail updates every few seconds.</div>` : ""}
        ` : "");
        setHtml(document.getElementById("steps-mount"), !bot ? "" : `
          <div class="steps">
            ${[
              ["boot", "Boot"],
              ["ingest", "Ingest"],
              ["filter", "Filter"],
              ["multimodal", "Analyze"],
              ["synthesize", "Synthesize"],
              ["done", "Done"],
            ].map(([id, label]) => {
              const cls = stepStatus(bot, id);
              return `<div class="step ${cls}"><strong>${label}</strong>${cls || "waiting"}</div>`;
            }).join("")}
          </div>`);
      }

      function render() {
        syncDraftsFromDom();
        const bot = selected();
        const st = botState(bot);
        const reachable = Boolean(bot?.health?.reachable);
        const status = bot?.status;
        const dir = state.direction;
        const pulseText = pulseLabel(st);

        const fleetHtml = state.loading
          ? `<p class="empty skeleton">Loading fleet…</p>`
          : `<section class="fleet">${state.bots.map((b) => `
              <button class="chip ${b.id === state.selectedId ? "active" : ""}" data-select="${b.id}" type="button">
                <h2>${b.name}</h2>
                <div class="meta">
                  <span class="pill ${botState(b)}">${botState(b)}</span>
                  <span>${b.health?.reachable ? "API up" : "API down"}</span>
                  <span>${b.status?.current_step || b.status?.last_action || "—"}</span>
                </div>
              </button>`).join("")}</section>`;

        const domainHtml = (dir && bot?.id === "instagram") ? `
          <div class="domain-card">
            <h5>Domain focus</h5>
            <p><strong>${esc(dir.brand_name || "Agency")}</strong> · ${esc(dir.business_type || "Software agency")} · ${esc(dir.region || "Global")}${dir.website ? ` · <a href="${esc(dir.website)}" target="_blank" rel="noreferrer">${esc(dir.website.replace(/^https?:\/\//, ""))}</a>` : ""}</p>
            <div class="tags">
              ${(dir.content_pillars || []).slice(0, 5).map((p) => `<span class="tag">${esc(p)}</span>`).join("")}
              ${(dir.competitor_hashtags || []).slice(0, 5).map((h) => `<span class="tag">${esc(h)}</span>`).join("")}
            </div>
          </div>` : "";

        const panelHtml = !bot ? `<p class="empty">No bots registered.</p>` : `
          <section class="panel" data-shell="1">
            <div class="panel-head">
              <div>
                <h3>${bot.name}</h3>
                <p class="hint" id="panel-hint">
                  <span class="pill ${st}">${st}</span>
                  <span>${status?.current_step || status?.last_action || "waiting"}</span>
                  ${status?.usage ? ` · ${status.usage.sessions_remaining} sessions left` : ""}
                  ${status?.last_error ? ` · ${status.last_error}` : ""}
                </p>
              </div>
              <div class="controls">
                <button type="button" class="${state.busy === "boot" ? "busy" : ""}" data-act="boot" ${state.busy ? "disabled" : ""}>Boot API</button>
                <button type="button" class="primary ${state.busy === "live" ? "busy" : ""}" data-act="live" ${state.busy || !reachable ? "disabled" : ""}>Run research</button>
                <button type="button" data-act="pause" ${state.busy || !reachable || st !== "running" ? "disabled" : ""}>Pause</button>
                <button type="button" data-act="resume" ${state.busy || !reachable || st !== "paused" ? "disabled" : ""}>Resume</button>
                <button type="button" class="danger" data-act="stop" ${state.busy || !reachable || (st !== "running" && st !== "paused") ? "disabled" : ""}>Stop</button>
              </div>
            </div>

            <div class="options">
              <label><input type="checkbox" id="opt-offline" ${state.offline ? "checked" : ""} /> Offline heuristics</label>
              <label><input type="checkbox" id="opt-multimodal" ${state.multimodal ? "checked" : ""} /> Analyze shortlisted media</label>
              <label><input type="checkbox" id="opt-engage" ${state.engage ? "checked" : ""} /> Engage after research</label>
            </div>
            <div class="banner info">Live research opens Chromium. Log into Instagram if asked — session is saved. Media analysis runs only on filtered top posts.</div>

            <div id="progress-mount"></div>
            <div id="steps-mount"></div>
            ${domainHtml}

            <div class="grid">
              <div>
                <div class="logs-head">
                  <h4>Live trail</h4>
                  <button type="button" class="ghost" data-act="copy-logs">Copy logs</button>
                </div>
                <pre class="logs" id="live-trail">${esc(logsText(bot))}</pre>
                <h4 style="margin-top:0.9rem">Artifacts</h4>
                <div class="artifacts" id="artifacts-mount">${(status?.artifacts || []).length
                  ? status.artifacts.map((a) => `<div><strong>${a.kind}</strong><br/><code>${a.path}</code></div>`).join("")
                  : `<span class="empty">None yet</span>`}</div>
              </div>
              <div>
                <h4>Direction</h4>
                ${state.direction ? `
                  <form id="dir-form">
                    <div class="field"><label>Brand name</label><input name="brand_name" value="${esc(dir.brand_name || "")}" /></div>
                    <div class="field"><label>Business type</label><input name="business_type" value="${esc(dir.business_type || "")}" /></div>
                    <div class="field"><label>Website</label><input name="website" value="${esc(dir.website || "")}" placeholder="https://valnee.com" /></div>
                    <div class="field"><label>Region</label><input name="region" value="${esc(dir.region || "")}" placeholder="e.g. India, US, Europe" /></div>
                    <div class="field"><label>Goals</label><textarea name="goals">${esc(dir.goals || "")}</textarea></div>
                    <div class="field"><label>Hashtags (one per line)</label><textarea name="hashtags">${esc((dir.competitor_hashtags || []).join("\n"))}</textarea></div>
                    <div class="field"><label>Content pillars (one per line)</label><textarea name="pillars">${esc((dir.content_pillars || []).join("\n"))}</textarea></div>
                    <div class="field"><label>Brand voice</label><textarea name="brand_voice">${esc(dir.brand_voice || "")}</textarea></div>
                    <div class="field"><label>Constraints</label><textarea name="constraints">${esc(dir.constraints || "")}</textarea></div>
                    <div class="controls"><button class="primary ${state.busy === "direction" ? "busy" : ""}" type="submit" ${state.busy || !reachable ? "disabled" : ""}>Save direction</button></div>
                  </form>` : `<p class="empty">Direction unavailable until the bot API is up.</p>`}
              </div>
            </div>
            <div id="catch-mount">${bot.id === "instagram" ? renderCaught() : ""}</div>
            <div id="outputs-mount">${bot.id === "instagram" ? renderOutputs() : ""}</div>
            <div id="ix-mount">${bot.id === "instagram" ? renderInteractions() : ""}</div>
          </section>`;

        app.innerHTML = `
          <div class="top-bar">
            <header>
              <h1 class="brand">Fleet Control</h1>
              <p class="sub">Boot, observe, and steer every social agent.</p>
            </header>
            <div class="pulse ${state.busy || st === "running" ? "busy" : ""}" id="pulse">
              <span class="dot"></span>
              <span id="pulse-text">${pulseText}</span>
            </div>
          </div>
          ${state.error ? `<div class="banner error">${esc(state.error)}</div>` : ""}
          ${state.notice ? `<div class="banner ok">${esc(state.notice)}</div>` : ""}
          ${fleetHtml}
          ${panelHtml}
        `;

        fillStatusMounts();
        bind();
        state.painted = true;
      }

      function bindInteractions() {
        app.querySelectorAll(".ix-item").forEach((el) => {
          const id = el.dataset.ixId;
          const draftEl = el.querySelector("textarea[data-draft]");
          if (draftEl && id) {
            draftEl.oninput = () => { state.ixDrafts[id] = draftEl.value; };
          }
          el.querySelectorAll("button[data-ix]").forEach((btn) => {
            btn.onclick = () => {
              const bot = selected();
              if (!bot || !id) return;
              const text = draftEl ? draftEl.value : (state.ixDrafts[id] ?? null);
              if (btn.dataset.ix === "approve") {
                return act("approve", async () => {
                  if (text != null) {
                    await api(`/api/bots/${bot.id}/interactions/${id}`, {
                      method: "PATCH",
                      body: JSON.stringify({ draft_text: text, final_text: text }),
                    });
                  }
                  await api(`/api/bots/${bot.id}/interactions/${id}/approve`, {
                    method: "POST",
                    body: JSON.stringify({ final_text: text }),
                  });
                  delete state.ixDrafts[id];
                });
              }
              if (btn.dataset.ix === "skip") {
                return act("skip", async () => {
                  await api(`/api/bots/${bot.id}/interactions/${id}/skip`, { method: "POST", body: "{}" });
                  delete state.ixDrafts[id];
                });
              }
              if (btn.dataset.ix === "execute") {
                return act("execute", async () => {
                  await api(`/api/bots/${bot.id}/interactions/${id}/execute`, {
                    method: "POST",
                    body: JSON.stringify({ dry_run: false }),
                  });
                  delete state.ixDrafts[id];
                });
              }
            };
          });
        });
      }

      function bindSoft() {
        // Re-bind only regions that patchLiveOnly may have replaced
        app.querySelectorAll("[data-tab]").forEach((btn) => {
          btn.onclick = () => {
            state.outputTab = btn.dataset.tab;
            state.forceFullRender = true;
            render();
          };
        });
        const runSelect = app.querySelector("#run-select");
        if (runSelect) {
          runSelect.onchange = () => {
            state.selectedRunId = runSelect.value || null;
            state.forceFullRender = true;
            refreshDetail(true);
          };
        }
        bindInteractions();
      }

      function bind() {
        app.querySelectorAll("[data-select]").forEach((el) => {
          el.onclick = () => {
            state.selectedId = el.dataset.select;
            state.notice = "";
            state.selectedRunId = null;
            state.outputs = null;
            state.forceFullRender = true;
            refreshDetail(true);
          };
        });
        const offline = app.querySelector("#opt-offline");
        const multimodal = app.querySelector("#opt-multimodal");
        const engage = app.querySelector("#opt-engage");
        if (offline) offline.onchange = () => { state.offline = offline.checked; };
        if (multimodal) multimodal.onchange = () => { state.multimodal = multimodal.checked; };
        if (engage) engage.onchange = () => { state.engage = engage.checked; };

        app.querySelectorAll("[data-act]").forEach((btn) => {
          btn.onclick = () => {
            const bot = selected();
            if (!bot) return;
            const name = btn.dataset.act;
            if (name === "boot") return act("boot", () => api(`/api/bots/${bot.id}/process/start`, { method: "POST" }));
            if (name === "live") return act("live", () => api(`/api/bots/${bot.id}/run`, { method: "POST", body: JSON.stringify(runBody()) }));
            if (name === "pause") return act("pause", () => api(`/api/bots/${bot.id}/pause`, { method: "POST" }));
            if (name === "resume") return act("resume", () => api(`/api/bots/${bot.id}/resume`, { method: "POST" }));
            if (name === "stop") return act("stop", () => api(`/api/bots/${bot.id}/stop`, { method: "POST" }));
            if (name === "propose") return act("propose", () => api(`/api/bots/${bot.id}/interactions/propose`, { method: "POST", body: "{}" }));
            if (name === "exec-approved") return act("exec-approved", async () => {
              const res = await api(`/api/bots/${bot.id}/interactions/execute-approved`, { method: "POST", body: JSON.stringify({ dry_run: false }) });
              if (res?.scripted_summary) state.notice = res.scripted_summary;
              if (res?.scripted_health) state.scriptedHealth = res.scripted_health;
              return res;
            });
            if (name === "resume-engage") {
              if (!window.confirm("Clear the engage pause and continue?")) return;
              const rotateProfile = window.confirm(
                "Also rotate to the next Chromium profile slot?\n\nUse this if IG is still sticky after a challenge. You may need to log into Instagram again in the new window."
              );
              return act("resume-engage", async () => {
                const res = await api(`/api/bots/${bot.id}/engage/circuit/clear`, {
                  method: "POST",
                  body: JSON.stringify({ rotate_profile: Boolean(rotateProfile) }),
                });
                state.circuit = res;
                return res;
              });
            }
            if (name === "copy-logs") {
              const text = state.logs.length
                ? state.logs.map((l) => `${l.ts || ""}  ${(l.step || "-").padEnd(11)}  ${l.message}`).join("\n")
                : (document.getElementById("live-trail")?.textContent || "");
              const mark = () => {
                btn.textContent = "Copied";
                btn.classList.add("copied");
                setTimeout(() => { btn.textContent = "Copy logs"; btn.classList.remove("copied"); }, 1400);
              };
              if (navigator.clipboard?.writeText) {
                return navigator.clipboard.writeText(text).then(mark).catch(() => {
                  state.error = "Clipboard blocked — select the log text manually.";
                });
              }
              const ta = document.createElement("textarea");
              ta.value = text;
              document.body.appendChild(ta);
              ta.select();
              try { document.execCommand("copy"); mark(); }
              catch { state.error = "Could not copy logs."; }
              finally { ta.remove(); }
              return;
            }
          };
        });

        const form = app.querySelector("#dir-form");
        if (form) {
          form.oninput = () => { syncDraftsFromDom(); };
          form.onsubmit = (e) => {
            e.preventDefault();
            const bot = selected();
            if (!bot || !state.direction) return;
            syncDraftsFromDom();
            const next = { ...state.direction };
            act("direction", () => api(`/api/bots/${bot.id}/direction`, { method: "PUT", body: JSON.stringify(next) }));
          };
        }

        bindSoft();
        syncIngestCommentModal();
      }

      function pollDelay() {
        if (state.live?.pending_comment) return 800;
        if (userIsBusy()) return 5000;
        const st = botState(selected());
        if (state.busy || st === "running" || st === "paused") return 1500;
        return 4000;
      }

      async function loop() {
        await refreshFleet();
        setTimeout(loop, pollDelay());
      }

      loop();
    </script>
  </body>
</html>
